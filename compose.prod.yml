services:
  stylophonix:
    networks:
      - reverse-proxy
    labels:
      caddy: stylophonix.de
      caddy.reverse_proxy: "{{upstreams 8080}}"
  
  filebrowser:
    image: filebrowser/filebrowser
    container_name: stylophonix-filebrowser
    restart: unless-stopped
    volumes:
      - /opt/stylophonix/data:/srv
      - /opt/stylophonix/filebrowser/database.db:/database.db
    networks:
      - reverse-proxy
    labels:
      caddy: ${EXTERNAL_URL_FILEBROWSER}
      caddy.reverse_proxy: "{{upstreams 80}}"

networks:
  reverse-proxy:
    external: true